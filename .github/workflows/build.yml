name: build and deploy

on:
  workflow_dispatch:
  push:
    branches: [ "develop" ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v6
      - run: |
          ./generate-types.sh
          npm ci
          npm run build
      - name: upload pages
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist
      - name: deploy pages
        id: deployment
        uses: actions/deploy-pages@v4
